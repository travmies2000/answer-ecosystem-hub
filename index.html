<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer Ecosystem Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Answer Ecosystem</h1>
        
        <section class="cta-banner">
            <p><strong>Don't Build Your Ecosystem in the Dark.</strong></p>
            <p>Access the live, fully functioning Answer Ecosystem to steal exact frameworks and scale your team's efficiency.</p>
            <a href="https://do-essential.net/collection/ai-future-of-work" target="_blank" class="cta-button">Step Inside the Live Answer Ecosystem Here</a>
        </section>

        <div class="controls">
            <div class="tabs">
                <button class="tab-btn active" onclick="filterCategory('All', this)">All</button>
                <button class="tab-btn" onclick="filterCategory('AI', this)">AI & Tech</button>
                <button class="tab-btn" onclick="filterCategory('Marketing', this)">Marketing</button>
                <button class="tab-btn" onclick="filterCategory('Income', this)">Income</button>
                <button class="tab-btn" onclick="filterCategory('Leadership', this)">Leadership</button>
                <button class="tab-btn" onclick="filterCategory('Lifestyle', this)">Lifestyle</button>
                <button class="tab-btn" onclick="filterCategory('Branding', this)">Branding</button>
            </div>
            <input type="text" id="searchInput" placeholder="Search across your entire resource library...">
        </div>
    </header>
    
    <main id="hubContainer"></main>

    <script src="script.js"></script>
</body>
</html>
